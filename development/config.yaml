# development/config.yaml — scientia per-repo configuration.
#
# All keys are optional. Defaults shipped in the scientia bundle apply
# when a key is absent.

# Version pin. Bumped only by install.sh --upgrade migrations.
scientia_schema_version: 1
bundle_version_installed: 0.1.0

# Where the wiki lives.
wiki:
  path: wiki/
  raw_path: raw/

# Hermes integration.
hermes:
  # Override per-repo if the host's kanban.db is project-specific.
  kanban_db: ~/.hermes/kanban.db
  # Parallel batch size per delegate_task call. Mapped to hermes'
  # delegation.max_concurrent_children. Default 3, min 1.
  # Applied to ~/.hermes/config.yaml when scientia-kanban-init runs;
  # scientia-kanban-emit refuses if the host drifts from this value.
  max_concurrent_children: 3
  # Profile name overrides — leave blank to use defaults.
  profile_names:
    implementer: scientia-implementer
    reviewer:    scientia-reviewer
    integrator:  scientia-integrator
    aggregator:  scientia-aggregator
  # Per-profile model configuration. scientia-kanban-init applies any
  # declared leaf via `hermes -p <name> config set`; scientia-kanban-emit
  # refuses on drift between this block and the effective profile config.
  # Keys mirror Hermes' per-profile config.yaml schema 1:1 — copy/paste
  # examples from
  # https://hermes-agent.nousresearch.com/docs/user-guide/configuring-models
  # work as-is. Schema reference:
  #   skills/scientia-kanban-init/references/profile-models.md
  #
  # Profile isolation: Hermes profiles are independent home directories
  # and do not inherit `custom_providers:` from `~/.hermes/config.yaml`.
  # When a role below references `custom:<name>`, scientia-kanban-init
  # copies the matching host `custom_providers` entry into the profile's
  # own config.yaml before applying these leaves. The host-level
  # `custom_providers:` definitions and the per-profile `.env` files
  # (for `FIREWORKS_API_KEY` etc.) remain your responsibility; scientia
  # never writes secrets.
  #
  # Defaults below route every profile through the Fireworks OpenAI-
  # compatible endpoint named "fireworks" in `~/.hermes/config.yaml`,
  # with a model chosen for the role's workload. To opt out and inherit
  # the Hermes host-level default model, comment out the `profiles:`
  # block entirely or set it to `{}`.
  # `agent.max_turns` per role tunes the worker's iteration budget
  # (default in Hermes is 90). Workers that hit the cap exit with
  # `⚠ Iteration budget reached (N/N) — response may be incomplete`
  # and the task transitions to `blocked`. Defaults below are scientia's
  # opinion on each role's typical workload — raise if you see workers
  # park at the cap with real work remaining.
  profiles:
    # Heaviest loop: read task → write code → run tests → debug → commit.
    # Implementer tasks routinely run 100+ turns on non-trivial work.
    implementer:
      model:
        provider: custom:fireworks
        default: accounts/fireworks/models/glm-5p1
      agent:
        max_turns: 200

    # Largest context — reads the full diff, the implementer's branch,
    # plus every ADR cited by the scenario in one pass. Mostly tool
    # calls (read, grep, run-checks), few write cycles.
    reviewer:
      model:
        provider: custom:fireworks
        default: accounts/fireworks/models/deepseek-v4-pro
      agent:
        max_turns: 120

    # Rebase + preflight + merge + comment, plus recovery paths
    # (sibling-respawn, fixup spawning). Several phases, mechanical
    # but with retry budget for failed preflights.
    integrator:
      model:
        provider: custom:fireworks
        default: accounts/fireworks/models/kimi-k2p6
      agent:
        max_turns: 150

    # Reads N finished child handoffs, writes one synthesis comment.
    # Bounded by spec size; rarely needs more than a few dozen turns.
    aggregator:
      model:
        provider: custom:fireworks
        default: accounts/fireworks/models/qwen3p6-plus
      agent:
        max_turns: 60

# Emit policy.
emit:
  # ADR-status -> collaboration pattern. The wiki documents these defaults.
  default_pattern_by_adr_status:
    accepted:    P2-pipeline
    proposed:    P5-human-in-loop
    deprecated:  refuse
    superseded:  refuse
  # Tenants in this list always emit with --require-approval, regardless of ADR status.
  require_approval_tenants: []

# Verify strictness. block_on_severity is the threshold for verify_all.py
# (and the orchestrator) to refuse to advance.
verify:
  block_on_severity: critical    # critical | warning | suggestion

# Ingest policy.
ingest:
  # When true, scientia-ingest-synthesize writes only proposed edits to
  # wiki/syntheses/; direct writes to wiki/concepts/ and wiki/entities/
  # are not allowed.
  synthesize_proposes_only: true

# Per-tenant overrides. Tenant name = bounded-context slug.
tenants: {}
#   billing:
#     require_approval: true
