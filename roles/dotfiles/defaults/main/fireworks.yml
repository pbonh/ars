---
# Fireworks AI provider settings — canonical source of truth for all tools
fireworks_base_url: "https://api.fireworks.ai/inference/v1"
fireworks_api_key_env: "FIREWORKS_API_KEY"

# Firepass: Fireworks tier limited to Kimi K2.6 Turbo. Uses the same base URL
# as the regular Fireworks API but a separate API key.
fireworks_firepass_api_key_env: "FIREWORKS_FIREPASS_API_KEY"

# Default model ID used across tools (regular fireworks_api_key tier)
fireworks_default_model_id: "accounts/fireworks/models/kimi-k2p6"

# Default model ID for the firepass tier (only model allowed by firepass)
fireworks_firepass_default_model_id: "accounts/fireworks/routers/kimi-k2p6-turbo"

# Canonical model definitions
# Compatible with pi; hermes derives its narrower dict via Jinja2 transformation
fireworks_models:
  - id: "accounts/fireworks/models/glm-5p1"
    name: "GLM 5.1"
    context_length: 131072
    contextWindow: 202000
    maxTokens: 32768
    reasoning: true
    input: ["text"]
    cost:
      input: 1.40
      output: 4.40
      cacheRead: 0.26
      cacheWrite: 1.40
  - id: "accounts/fireworks/models/kimi-k2p5"
    name: "Kimi K2.5"
    context_length: 131072
    contextWindow: 262000
    maxTokens: 32768
    reasoning: true
    input: ["text", "image"]
    cost:
      input: 0.60
      output: 3.00
      cacheRead: 0.10
      cacheWrite: 0.60
  - id: "accounts/fireworks/models/kimi-k2p6"
    name: "Kimi K2.6"
    context_length: 131072
    contextWindow: 262000
    maxTokens: 32768
    reasoning: true
    input: ["text", "image"]
    cost:
      input: 0.95
      output: 4.00
      cacheRead: 0.16
      cacheWrite: 0.95
  - id: "accounts/fireworks/models/qwen3p6-plus"
    name: "Qwen 3.6 Plus"
    context_length: 131072
    contextWindow: 128000
    maxTokens: 32768
    reasoning: true
    input: ["text", "image"]
    cost:
      input: 0.50
      output: 3.00
      cacheRead: 0.10
      cacheWrite: 0.50
  - id: "accounts/fireworks/models/minimax-m2p7"
    name: "MiniMax M2.7"
    context_length: 131072
    contextWindow: 196608
    maxTokens: 32768
    reasoning: true
    input: ["text"]
    cost:
      input: 0.30
      output: 1.20
      cacheRead: 0.06
      cacheWrite: 0.30
  - id: "accounts/fireworks/models/deepseek-v4-pro"
    name: "DeepSeek V4 Pro"
    context_length: 384000
    contextWindow: 1000000
    maxTokens: 384000
    reasoning: true
    input: ["text"]
    cost:
      input: 1.74
      output: 3.48
      cacheRead: 0.15
      cacheWrite: 1.74

# Models allowed by the firepass tier — currently Kimi K2.6 Turbo only.
# Pricing mirrors kimi-k2p6 as a placeholder; adjust if firepass pricing differs.
fireworks_firepass_models:
  - id: "accounts/fireworks/routers/kimi-k2p6-turbo"
    name: "Kimi K2.6 Turbo"
    context_length: 131072
    contextWindow: 262000
    maxTokens: 32768
    reasoning: true
    input: ["text", "image"]
    cost:
      input: 0.95
      output: 4.00
      cacheRead: 0.16
      cacheWrite: 0.95
