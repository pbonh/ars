opencode_global_config:
  $schema: "https://opencode.ai/config.json"
  theme: "tokyonight"
  model: "{{ opencode_default_model }}"
  default_agent: "{{ opencode_default_agent }}"
  permission:
    skill:
      "*": "allow"
      "td": "allow"
      "internal-*": "deny"
      "experimental-*": "ask"
  provider: "{{ {} | combine(opencode_provider_anthropic) | combine(opencode_provider_openai) | combine(opencode_provider_moonshot) | combine(opencode_provider_fireworks) }}"
