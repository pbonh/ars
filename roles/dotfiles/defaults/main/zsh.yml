---
zsh_username: "{{ ansible_env.USER }}"
zsh_plugins: "{{ dotfiles_user_home }}/.zsh"
zsh_completions: "{{ zsh_plugins }}/completion"
zsh_completion_just: "{{ zsh_completions }}/_just"
zsh_fzf_tab: "{{ zsh_plugins }}/fzf-tab"
zsh_git_fuzzy: "{{ zsh_plugins }}/git-fuzzy"
zsh_git_fuzzy_upstream: origin
zsh_git_fuzzy_branch: main
zsh_mise_env: |
  eval "$(mise activate zsh)"
zsh_homebrew_env: ""
zsh_nonroot_env: ""
zsh_devbox_env: ""
zsh_default_options: |
  HISTFILE=~/.histfile
  HISTSIZE=1000
  SAVEHIST=1000
  bindkey -v
  zstyle :compinstall filename '{{ dotfiles_user_home }}/.zshrc'
  fpath=({{ zsh_completions }} $fpath)
  autoload -Uz compinit
  compinit
zsh_default_env: |
  {% for path_info in path_directories -%}
  {% if path_directories[path_info]['prepend'] == false %}
  {{ "export PATH=$PATH:" + path_directories[path_info]['path'] }}
  {% else %}
  {{ "export PATH=" + path_directories[path_info]['path'] + ":$PATH" }}
  {% endif %}
  {% endfor %}
  {{ zsh_mise_env }}
  {{ zsh_devbox_env }}
  {{ zsh_homebrew_env }}
  {{ zsh_nonroot_env }}
  {% for env_var in env_variables | dict2items -%}
  export {{ env_var.key | upper }}="{{ env_var.value }}"
  {% endfor %}
zsh_extra_env: ""
zsh_default_plugins: |
  if command -v wt >/dev/null 2>&1; then eval "$(command wt config shell init zsh)"; fi
  eval "$({{ atuin_exe }} init zsh)"
  eval "$({{ direnv_exe }} hook zsh)"
  eval "$({{ starship_exe }} init zsh)"
  eval "$({{ zoxide_exe }} init zsh)"
zsh_fzf_path: "export PATH=$PATH:{{ fzf_path }}"
zsh_fzf_setup: |
  # Set up fzf key bindings and fuzzy completion
  FZF_CTRL_R_OPTS= source <({{ fzf_exe }} --zsh)
  bindkey '^r' atuin-search
  export PATH=$PATH:{{ zsh_git_fuzzy }}/bin
  export GF_BASE_REMOTE={{ zsh_git_fuzzy_upstream }}
  export GF_BASE_BRANCH={{ zsh_git_fuzzy_branch }}
  export SKIM_DEFAULT_COMMAND="{{ fd_exe }} --type f || git ls-tree -r --name-only HEAD || {{ rg_exe }} --files || find ."
  fzf_find_edit() {
      local file=$(
          {{ fzf_exe }} --query="$1" --no-multi --select-1 --exit-0 \
          --preview '{{ bat_exe }} --color=always --line-range :500 {}'
      )
      if [[ -n $file ]]; then
          $EDITOR "$file"
      fi
  }
  fzf_change_directory() {
      local directory=$(
      {{ fd_exe }} --type d | \
          {{ fzf_exe }} --query="$1" --no-multi --select-1 --exit-0 \
          --preview 'tree -C {} | head -100'
      )
      if [[ -n $directory ]]; then
          cd "$directory"
      fi
  }
  fzf_change_directory_arg() {
      if [[ $# == 0 ]]; then
          echo 'Error: search term was not provided.'
          return
      fi
      local directory=$(
      {{ fd_exe }} --type d $1 | \
          {{ fzf_exe }} --query="$2" --no-multi --select-1 --exit-0 \
          --preview 'tree -C {} | head -100'
      )
      if [[ -n $directory ]]; then
          cd "$directory"
      fi
  }
  fzf_grep_edit(){
      if [[ $# == 0 ]]; then
          echo 'Error: search term was not provided.'
          return
      fi
      local match=$(
      {{ rg_exe }} --color=never --line-number "$1" |
          {{ fzf_exe }} --no-multi --delimiter : \
          --preview "{{ bat_exe }} --color=always --line-range {2}: {1}"
      )
      local file=$(echo "$match" | cut -d':' -f1)
      if [[ -n $file ]]; then
          $EDITOR "$file" +$(echo "$match" | cut -d':' -f2)
      fi
  }
  fzf_kill() {
      local pid_col
      if [[ $(uname) = Linux ]]; then
          pid_col=2
      elif [[ $(uname) = Darwin ]]; then
          pid_col=3;
      else
          echo 'Error: unknown platform'
          return
      fi
      local pids=$(
          ps -f -u $USER | sed 1d | {{ fzf_exe }} --multi | tr -s [:blank:] | cut -d' ' -f"$pid_col"
      )
      if [[ -n $pids ]]; then
          echo "$pids" | xargs kill -9 "$@"
      fi
  }
  alias cdg='cd $(cdscuts_glob_echo | {{ fzf_exe }})'
  alias mkcd='make_directory_then_change'
  alias ffe='fzf_find_edit'
  alias fcd='fzf_change_directory'
  alias fcdd='fzf_change_directory_arg'
  alias fge='fzf_grep_edit'
  alias fkill='fzf_kill'
  alias fsk='{{ skim_exe }} --ansi -i -c '"'"'{{ fd_exe }} --type f "{}"'"'"''
  alias gsk='{{ skim_exe }} --ansi -i -c '"'"'{{ rg_exe }} --color=always --line-number "{}"'"'"''
  alias dsk='{{ skim_exe }} --ansi -i -c '"'"'{{ fd_exe }} --type d "{}"'"'"''
  alias skvi='f(){ x="$({{ skim_exe }} --bind "ctrl-p:toggle-preview" --ansi --preview="{{ bat_exe }} {} --color=always" --preview-window=right:60%:hidden)"; [[ $? -eq 0 ]] && {{ nvim_exe }} "$x" || true }; f'
  {% for fzf_env_var in fzf_env -%}
  {{ "export " + fzf_env[fzf_env_var]['name'] + "='" + fzf_env[fzf_env_var]['env'] + "'" }}
  {% endfor %}
zsh_yazi_setup: |
  function yy() {
    local tmp="$(mktemp -t "yazi-cwd.XXXXX")"
    {{ yazi_exe }} "$@" --cwd-file="$tmp"
    if cwd="$(cat -- "$tmp")" && [ -n "$cwd" ] && [ "$cwd" != "$PWD" ]; then
            cd -- "$cwd"
    fi
    rm -f -- "$tmp"
  }
zsh_navi_setup: |
  {% for category, commands in navi_cheats.items() %}
  {% for cmd_name, cmd_info in commands.items() %}
  alias nr-{{ cmd_name }}='{{ navi_exe }} --fzf-overrides "--exact --with-nth 1,2" --query "{{ cmd_name }} ::" --best-match'
  {% endfor %}
  {% endfor %}

  # eval "$({{ navi_exe }} widget zsh)"
  _navi_call() {
     local result="$({{ navi_exe }} "$@" </dev/tty)"
     printf "%s" "$result"
  }
  _navi_widget() {
     local -r input="${LBUFFER}"
     local -r last_command="$(echo "${input}" | {{ navi_exe }} fn widget::last_command)"
     local replacement="$last_command"
     if [ -z "$last_command" ]; then
        replacement="$(_navi_call --print)"
     elif [ "$LASTWIDGET" = "_navi_widget" ] && [ "$input" = "$previous_output" ]; then
        replacement="$(_navi_call --print --query "$last_command")"
     else
        replacement="$(_navi_call --print --best-match --query "$last_command")"
     fi
     if [ -n "$replacement" ]; then
        local -r find="${last_command}_NAVIEND"
        previous_output="${input}_NAVIEND"
        previous_output="${previous_output//$find/$replacement}"
     else
        previous_output="$input"
     fi
     zle kill-whole-line
     LBUFFER="${previous_output}"
     region_highlight=("P0 100 bold")
     zle redisplay
  }
  zle -N _navi_widget
  bindkey '^a' _navi_widget
  alias nvi='{{ navi_shell_cmd }}'
zsh_nvim_setup: |
  {% for nvim_profile_name in nvim_xdg_modular_profiles -%}
  {{ "alias vim-" + nvim_xdg_modular_profiles[nvim_profile_name]['name'] + "='NVIM_APPNAME=" + nvim_xdg_modular_profiles[nvim_profile_name]['appname'] + "-modular " + nvim_exe + "'" }}
  {% endfor %}
zsh_default_aliases: |
  {% for shell_alias in shell_aliases | dict2items -%}
  alias {{ shell_alias.key }}='{{ shell_alias.value.sh }}'
  {% endfor %}
zsh_extra_aliases: |
  {% for shell_alias in extra_shell_aliases | dict2items -%}
  alias {{ shell_alias.key }}='{{ shell_alias.value.sh }}'
  {% endfor %}
zsh_zellij_aliases: |
  {% for zellij_layout in zellij_kdl_layouts -%}
  alias z{{ zellij_layout }}='{{ zellij_exe }} --layout {{ zellij_kdl_layouts[zellij_layout]['name'] }}'
  {% endfor %}
  zellij_worktrunk_switch() {
    {% if zellij_shell_cmd == 'nu' %}
    local wt_cmd='wt switch; if $env.LAST_EXIT_CODE == 0 { let wt_name = (git rev-parse --show-toplevel | str trim | path basename); if $wt_name != "" { zellij action rename-tab $wt_name } }'
    {% else %}
    local wt_cmd='wt switch && wt_name=$(basename "$(git rev-parse --show-toplevel 2>/dev/null)") && [ -n "$wt_name" ] && zellij action rename-tab "$wt_name"'
    {% endif %}
    if [[ -z "$ZELLIJ" ]]; then
      wt switch
      return
    fi
    {{ zellij_exe }} action new-tab -c "$PWD" -n "{{ zellij_worktrunk_switch_tab_name }}"
    {{ zellij_exe }} action write-chars "$wt_cmd"
    {{ zellij_exe }} action write 13
  }
  zellij_worktrunk_switch_all() {
    {% if zellij_shell_cmd == 'nu' %}
    local wt_cmd='wt switch --branches --remotes; if $env.LAST_EXIT_CODE == 0 { let wt_name = (git rev-parse --show-toplevel | str trim | path basename); if $wt_name != "" { zellij action rename-tab $wt_name } }'
    {% else %}
    local wt_cmd='wt switch --branches --remotes && wt_name=$(basename "$(git rev-parse --show-toplevel 2>/dev/null)") && [ -n "$wt_name" ] && zellij action rename-tab "$wt_name"'
    {% endif %}
    if [[ -z "$ZELLIJ" ]]; then
      wt switch --branches --remotes
      return
    fi
    {{ zellij_exe }} action new-tab -c "$PWD" -n "{{ zellij_worktrunk_switch_tab_name }}"
    {{ zellij_exe }} action write-chars "$wt_cmd"
    {{ zellij_exe }} action write 13
  }
  alias {{ zellij_worktrunk_switch_alias }}='zellij_worktrunk_switch'
  alias {{ zellij_worktrunk_switch_all_alias }}='zellij_worktrunk_switch_all'
  zellij_open_tool() {
    local pane_name="$1"
    shift
    local tool_command="$1"
    shift
    if [[ -z "$ZELLIJ" ]]; then
      "$tool_command" "$@"
      return
    fi
    {{ zellij_exe }} run --floating --close-on-exit --name "$pane_name" --height "{{ zellij_ai_pane_height }}" --width "{{ zellij_ai_pane_width }}" --x "{{ zellij_ai_pane_x }}" --y "{{ zellij_ai_pane_y }}" -- "$tool_command" "$@"
  }
  zellij_open_tool_pane() {
    local pane_name="$1"
    shift
    local tool_command="$1"
    shift
    if [[ -z "$ZELLIJ" ]]; then
      "$tool_command" "$@"
      return
    fi
    {{ zellij_exe }} run --close-on-exit --name "$pane_name" -- "$tool_command" "$@"
  }
  zellij_claude_pane() {
    zellij_open_tool "{{ zellij_claude_pane_name }}" "{{ zellij_claude_command }}" "$@"
  }
  zellij_codex_pane() {
    zellij_open_tool "{{ zellij_codex_pane_name }}" "{{ zellij_codex_command }}" "$@"
  }
  zellij_opencode_pane() {
    zellij_open_tool "{{ zellij_opencode_pane_name }}" "{{ zellij_opencode_command }}" "$@"
  }
  zellij_claude_tab() {
    zellij_open_tool_pane "{{ zellij_claude_pane_name }}" "{{ zellij_claude_command }}" "$@"
  }
  zellij_codex_tab() {
    zellij_open_tool_pane "{{ zellij_codex_pane_name }}" "{{ zellij_codex_command }}" "$@"
  }
  zellij_opencode_tab() {
    zellij_open_tool_pane "{{ zellij_opencode_pane_name }}" "{{ zellij_opencode_command }}" "$@"
  }
  alias {{ zellij_claude_alias }}='zellij_claude_pane'
  alias {{ zellij_codex_alias }}='zellij_codex_pane'
  alias {{ zellij_opencode_alias }}='zellij_opencode_pane'
  alias {{ zellij_claude_pane_alias }}='zellij_claude_tab'
  alias {{ zellij_codex_pane_alias }}='zellij_codex_tab'
  alias {{ zellij_opencode_pane_alias }}='zellij_opencode_tab'
zsh_ssh_setup_plain: |
  env={{ dotfiles_user_home }}/.ssh/agent.env
  agent_load_env () {
      if [ -f "$env" ] && [ ! -r "$env" ]; then
          rm -f "$env"
      fi
      [ -r "$env" ] && . "$env" >| /dev/null
  }
  agent_start () {
      (umask 077; ssh-agent >| "$env")
      . "$env" >| /dev/null ; }
  agent_load_env
  # agent_run_state: 0=agent running w/ key; 1=agent w/o key; 2=agent not running
  agent_run_state=$(ssh-add -l >| /dev/null 2>&1; echo $?)
  if [ ! "$SSH_AUTH_SOCK" ] || [ $agent_run_state = 2 ]; then
      agent_start
      ssh-add
  elif [ "$SSH_AUTH_SOCK" ] && [ $agent_run_state = 1 ]; then
      ssh-add
  fi
  unset env
zsh_ssh_fido2_enabled: true
zsh_ssh_fido2_auto_generate: true
zsh_ssh_fido2_auto_add: true
zsh_ssh_fido2_key_type: "ed25519-sk"
zsh_ssh_fido2_key_file: "{{ dotfiles_user_home }}/.ssh/id_ed25519_sk"
zsh_ssh_fido2_application: "ssh:default"
zsh_ssh_fido2_comment: "{{ ansible_env.USER }}@yubikey-fido2"
zsh_ssh_setup_fido2: |
  env={{ dotfiles_user_home }}/.ssh/agent.env
  ssh_fido2_key_file="{{ zsh_ssh_fido2_key_file }}"
  ssh_fido2_key_pub="${ssh_fido2_key_file}.pub"
  ssh_fido2_key_type="{{ zsh_ssh_fido2_key_type }}"
  ssh_fido2_application="{{ zsh_ssh_fido2_application }}"
  ssh_fido2_key_comment="{{ zsh_ssh_fido2_comment }}"
  agent_load_env () {
      if [ -f "$env" ] && [ ! -r "$env" ]; then
          rm -f "$env"
      fi
      [ -r "$env" ] && . "$env" >| /dev/null
  }
  agent_start () {
      (umask 077; ssh-agent >| "$env")
      . "$env" >| /dev/null
  }
  fido2_generate_if_missing () {
      if [ "{{ zsh_ssh_fido2_auto_generate | bool | lower }}" != "true" ]; then
          return
      fi
      if [ -f "$ssh_fido2_key_file" ] && [ -f "$ssh_fido2_key_pub" ]; then
          return
      fi
      if ! command -v ssh-keygen >/dev/null 2>&1; then
          return
      fi
      if [ ! -t 0 ] || [ ! -t 1 ]; then
          return
      fi
      mkdir -p "{{ dotfiles_user_home }}/.ssh"
      chmod 700 "{{ dotfiles_user_home }}/.ssh" >/dev/null 2>&1 || true
      ssh-keygen \
          -t "$ssh_fido2_key_type" \
          -O resident \
          -O verify-required \
          -O "application=$ssh_fido2_application" \
          -f "$ssh_fido2_key_file" \
          -C "$ssh_fido2_key_comment"
  }
  fido2_add_key () {
      if [ "{{ zsh_ssh_fido2_auto_add | bool | lower }}" != "true" ]; then
          return
      fi
      if [ ! -f "$ssh_fido2_key_file" ]; then
          return
      fi
      ssh-add "$ssh_fido2_key_file" >/dev/null
  }
  agent_load_env
  # agent_run_state: 0=agent running w/ key; 1=agent w/o key; 2=agent not running
  agent_run_state=$(ssh-add -l >| /dev/null 2>&1; echo $?)
  if [ ! "$SSH_AUTH_SOCK" ] || [ "$agent_run_state" = 2 ]; then
      agent_start
  fi
  fido2_generate_if_missing
  fido2_add_key
  unset env
  unset ssh_fido2_key_file
  unset ssh_fido2_key_pub
  unset ssh_fido2_key_type
  unset ssh_fido2_application
  unset ssh_fido2_key_comment
zsh_ssh_setup: "{{ zsh_ssh_setup_fido2 if (zsh_ssh_fido2_enabled | bool) else zsh_ssh_setup_plain }}"
