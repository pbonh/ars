---
pi_config_dir: "{{ ansible_env.HOME }}/.pi/agent"
pi_settings_path: "{{ pi_config_dir }}/settings.json"
pi_skills_dir: "{{ pi_config_dir }}/skills"
pi_extensions_dir: "{{ pi_config_dir }}/extensions"
pi_sessions_dir: "{{ ansible_env.HOME }}/.pi/sessions"

pi_prompts_dir: "{{ ansible_env.HOME }}/.pi/prompts"
pi_harness_dir: "{{ ansible_env.HOME }}/.pi/harness"

pi_default_provider: "firepass"
pi_default_model: "{{ fireworks_firepass_default_model_id }}"
pi_default_thinking_level: "high"
pi_theme: "dark"

pi_packages:
  - source: "pi-skills"
    skills:
      - "brave-search"
    extensions: []

# Extra resource paths loaded from settings.json.
pi_skill_paths: []
pi_extension_paths: []
pi_prompt_paths:
  - "{{ pi_prompts_dir }}"
pi_theme_paths: []

# Example:
# pi_skills:
#   - name: "my-skill"
#     description: "What this skill does and when to use it."
#     content: |
#       # My Skill
#       Skill instructions.
pi_skills: []

# Extensions are copied from role files at roles/dotfiles/files/pi/extensions/<item>.
# Example:
# pi_extensions:
#   - "my-extension.ts"
#   - "my-extension"
pi_extensions: []

# Git packages cloned from git and managed by Ansible (not via `pi install`).
# Each item must have a `repo` URL. Optional fields:
#   - version: branch, tag, or commit ref (default: HEAD)
#   - name:    directory name under ~/.pi/agent/git/ (default: repo basename)
pi_packages_git:
  - repo: "https://github.com/pbonh/pi-llm-wiki"
    version: "main"
    name: "pi-llm-wiki"

pi_packages_git_dir: "{{ ansible_env.HOME }}/.pi/agent/git"

# Fireworks provider extension (templated to roles/dotfiles/templates/pi/extensions/fireworks.ts.j2).
pi_fireworks_enabled: true
pi_fireworks_provider_name: "fireworks"
pi_fireworks_base_url: "{{ fireworks_base_url }}"
pi_fireworks_api_key_env: "{{ fireworks_api_key_env }}"
pi_fireworks_api: "openai-completions"
pi_fireworks_auth_header: true

pi_fireworks_models: "{{ fireworks_models }}"

# Firepass tier — same template registers it as a second provider so the user
# can pick `firepass/<model>` for the Kimi K2.6 Turbo tier and `fireworks/<model>`
# for the regular catalog.
pi_firepass_enabled: true
pi_firepass_provider_name: "firepass"
pi_firepass_base_url: "{{ fireworks_base_url }}"
pi_firepass_api_key_env: "{{ fireworks_firepass_api_key_env }}"
pi_firepass_api: "openai-completions"
pi_firepass_auth_header: true

pi_firepass_models: "{{ fireworks_firepass_models }}"

pi_global_config:
  defaultProvider: "{{ pi_default_provider }}"
  defaultModel: "{{ pi_default_model }}"
  defaultThinkingLevel: "{{ pi_default_thinking_level }}"
  theme: "{{ pi_theme }}"
  sessionDir: "{{ pi_sessions_dir }}"
  enableSkillCommands: true
  packages: "{{ pi_packages }}"
  skills: "{{ pi_skill_paths }}"
  extensions: "{{ pi_extension_paths }}"
  prompts: "{{ pi_prompt_paths }}"
  themes: "{{ pi_theme_paths }}"
