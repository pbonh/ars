---
- name: Scientia | Ensure skills root directory exists
  ansible.builtin.file:
    path: "{{ scientia_skills_root }}"
    state: directory
    mode: "0755"
  when: scientia_enabled | default(false)

- name: Scientia | Clone repository
  ansible.builtin.git:
    repo: "{{ scientia_repo }}"
    dest: "{{ scientia_dir }}"
    version: "HEAD"
  when: scientia_enabled | default(false)

- name: Scientia | Ensure Hermes profiles directory exists
  ansible.builtin.file:
    path: "{{ hermes_profiles_dir | default(hermes_home_dir + '/profiles') }}"
    state: directory
    mode: "0755"
  when:
    - scientia_enabled | default(false)
    - scientia_hermes_profiles_enabled | default(false)

- name: Scientia | Copy Hermes agent profiles
  ansible.builtin.copy:
    src: "{{ scientia_profiles_source_dir }}/{{ item }}"
    dest: "{{ hermes_profiles_dir | default(hermes_home_dir + '/profiles') }}/{{ item }}"
    mode: "0644"
    remote_src: true
  loop:
    - scientia-implementer.md
    - scientia-reviewer.md
    - scientia-integrator.md
    - scientia-aggregator.md
  when:
    - scientia_enabled | default(false)
    - scientia_hermes_profiles_enabled | default(false)

- name: Scientia | Create client symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ scientia_symlinks }}"
  when:
    - scientia_enabled | default(false)
    - scientia_symlinks | length > 0
