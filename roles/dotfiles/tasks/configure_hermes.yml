---
- name: Hermes | Ensure home directory exists
  ansible.builtin.file:
    path: "{{ hermes_home_dir }}"
    state: directory
    mode: "0700"

- name: Hermes | Write config.yaml
  ansible.builtin.template:
    src: "hermes/config.yaml.j2"
    dest: "{{ hermes_config_path }}"
    mode: "0600"

- name: Hermes | Check if any env vars are set
  ansible.builtin.set_fact:
    _hermes_env_has_values: "{{ hermes_env_vars.values() | select | list | length > 0 }}"
  no_log: true

- name: Hermes | Write .env (API keys)
  ansible.builtin.copy:
    dest: "{{ hermes_env_path }}"
    content: |
      # Managed by ansible-dotfiles — edit defaults/main/hermes.yml instead
      {% for key, value in hermes_env_vars.items() -%}
      {% if value -%}
      {{ key }}={{ value }}
      {% endif -%}
      {% endfor -%}
    mode: "0600"
  when: _hermes_env_has_values
  no_log: true

- name: Hermes | Ensure skills directory exists
  ansible.builtin.file:
    path: "{{ hermes_skills_dir }}"
    state: directory
    mode: "0755"
  when: hermes_skills | length > 0

- name: Hermes | Create per-skill directories
  ansible.builtin.file:
    path: "{{ hermes_skills_dir }}/{{ skill.name }}"
    state: directory
    mode: "0755"
  loop: "{{ hermes_skills }}"
  loop_control:
    loop_var: skill

- name: Hermes | Deploy skill directories (static assets)
  ansible.builtin.copy:
    src: "hermes/skills/{{ item.name }}/"
    dest: "{{ hermes_skills_dir }}/{{ item.name }}/"
    mode: "0644"
  loop: "{{ hermes_skills | selectattr('content_file', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Hermes | Template SKILL.md files
  ansible.builtin.template:
    src: "hermes/SKILL.md.j2"
    dest: "{{ hermes_skills_dir }}/{{ skill.name }}/SKILL.md"
    mode: "0644"
  loop: "{{ hermes_skills }}"
  loop_control:
    loop_var: skill
